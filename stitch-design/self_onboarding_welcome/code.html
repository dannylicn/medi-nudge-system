<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Welcome to Merlion Health</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-tertiary": "#ffffff",
              "tertiary-fixed": "#a3f69c",
              "surface-container-lowest": "#ffffff",
              "surface-container": "#ebeef0",
              "on-error-container": "#93000a",
              "secondary-fixed-dim": "#96ccff",
              "outline-variant": "#bdc9c8",
              "on-primary": "#ffffff",
              "on-tertiary-fixed-variant": "#005312",
              "tertiary-fixed-dim": "#88d982",
              "secondary-fixed": "#cee5ff",
              "on-secondary-fixed-variant": "#004a75",
              "inverse-primary": "#76d6d5",
              "surface-container-highest": "#e0e3e5",
              "primary-fixed": "#93f2f2",
              "tertiary": "#156820",
              "on-primary-fixed-variant": "#004f4f",
              "primary-container": "#008080",
              "on-tertiary-fixed": "#002204",
              "secondary-container": "#90c9ff",
              "secondary": "#206393",
              "surface-bright": "#f7fafc",
              "inverse-surface": "#2d3133",
              "surface": "#f7fafc",
              "on-primary-container": "#e3fffe",
              "on-error": "#ffffff",
              "surface-variant": "#e0e3e5",
              "on-tertiary-container": "#ebffe3",
              "on-secondary-fixed": "#001d32",
              "on-primary-fixed": "#002020",
              "primary-fixed-dim": "#76d6d5",
              "on-surface": "#181c1e",
              "on-secondary": "#ffffff",
              "surface-tint": "#006a6a",
              "error": "#ba1a1a",
              "background": "#f7fafc",
              "inverse-on-surface": "#eef1f3",
              "surface-dim": "#d7dadc",
              "on-background": "#181c1e",
              "primary": "#006565",
              "surface-container-high": "#e5e9eb",
              "surface-container-low": "#f1f4f6",
              "outline": "#6e7979",
              "on-surface-variant": "#3e4949",
              "on-secondary-container": "#035584",
              "error-container": "#ffdad6",
              "tertiary-container": "#338236"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-effect {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .hero-gradient {
            background: linear-gradient(135deg, #006565 0%, #008080 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background font-body text-on-surface antialiased flex flex-col min-h-screen">
<!-- Screen Content: Mobile-First Onboarding (Navigation Suppressed for Focus) -->
<main class="flex-grow flex flex-col relative overflow-hidden">
<!-- Hero Section with Asymmetric Design -->
<div class="relative h-[397px] w-full overflow-hidden">
<div class="absolute inset-0 bg-secondary-container/20">
<img class="w-full h-full object-cover mix-blend-multiply opacity-60" data-alt="Modern clinical interior with warm natural light, soft teal accents, and a clean organized architectural feel" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBroanidVln-s2ryjNJWRBgjDhCWdfUr1NEEFFVLzyYrv_sn6za1B4Ygn2YOW1JWgA-B3hKv_PLZdFY-y8z7kriRwEoIkDGSlqVhADUJ0_jAPBmgsftGMyDLHC0R4ZIBIhx-NaHHTzo5LWqhIIRld67mFraedr98M4M3zhByR0Ot81cxRiIYLX6fAVa6upipfKGHB2F4NSsFFgKD1GT19o8tBJNtQKqqsYev0FuoZbkborXB77ijUBugQE_r7sFoMSFY4CnDS_Xf7Q"/>
</div>
<!-- Abstract Shape for Softness -->
<div class="absolute -bottom-1 left-0 right-0 h-24 bg-background" style="clip-path: ellipse(60% 100% at 50% 100%);"></div>
<!-- Logo Overlay -->
<div class="absolute top-12 left-8">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-3xl" style="font-variation-settings: 'FILL' 1;">medical_services</span>
<span class="font-headline font-extrabold text-2xl tracking-tight text-primary">Merlion Health</span>
</div>
</div>
</div>
<!-- Content Body -->
<div class="px-8 pb-12 flex flex-col flex-grow">
<!-- Empathy Greeting -->
<div class="space-y-4 mb-10">
<h1 class="font-headline text-display-lg font-extrabold text-on-surface leading-[1.1] tracking-tight">
                    Welcome to Merlion Health.
                </h1>
<p class="font-body text-headline-md text-on-surface-variant font-medium leading-relaxed max-w-[280px]">
                    Let's set up your care companion.
                </p>
</div>
<!-- Value Props (Bento Lite) -->
<div class="grid grid-cols-2 gap-3 mb-10">
<div class="bg-surface-container-low p-4 rounded-xl space-y-2">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">security</span>
<p class="font-label text-label-sm font-semibold uppercase tracking-wider text-on-surface-variant">Secure</p>
<p class="font-body text-[13px] text-on-surface-variant leading-tight">Data protected by Singapore standards.</p>
</div>
<div class="bg-surface-container-low p-4 rounded-xl space-y-2">
<span class="material-symbols-outlined text-secondary" style="font-variation-settings: 'FILL' 1;">favorite</span>
<p class="font-label text-label-sm font-semibold uppercase tracking-wider text-on-surface-variant">Personal</p>
<p class="font-body text-[13px] text-on-surface-variant leading-tight">Tailored to your health journey.</p>
</div>
</div>
<!-- Action Area -->
<div class="mt-auto space-y-4">
<!-- Primary CTA: Patient Onboarding -->
<button class="hero-gradient w-full py-5 rounded-full text-on-primary font-headline font-bold text-lg shadow-xl shadow-primary/20 flex items-center justify-center gap-3 active:scale-95 transition-transform duration-200">
                    Start Self-Onboarding
                    <span class="material-symbols-outlined">arrow_forward</span>
</button>
<!-- Secondary CTA: Caregiver Entry -->
<button class="w-full py-5 rounded-full bg-surface-container-highest/50 text-on-surface font-headline font-semibold text-md flex items-center justify-center gap-2 active:bg-surface-container-highest transition-colors">
<span class="material-symbols-outlined text-secondary">hail</span>
                    I am a Caregiver
                </button>
</div>
<!-- Minimal Footer Info -->
<div class="mt-8 text-center">
<p class="font-label text-label-sm text-outline flex items-center justify-center gap-1.5">
<span class="material-symbols-outlined text-[14px]">lock</span>
                    Your privacy is our priority
                </p>
</div>
</div>
</main>
<!-- Visual Polish: Soft Ambient Glows -->
<div class="fixed top-[-10%] right-[-10%] w-64 h-64 bg-primary/5 rounded-full blur-[80px] pointer-events-none"></div>
<div class="fixed bottom-[-5%] left-[-10%] w-72 h-72 bg-secondary/5 rounded-full blur-[100px] pointer-events-none"></div>
</body></html>
